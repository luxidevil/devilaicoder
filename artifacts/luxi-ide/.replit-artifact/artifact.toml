kind = "web"
previewPath = "/"
title = "LUXI IDE"
version = "1.0.0"
id = "artifacts/luxi-ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22320

[services.development]
run = "pnpm --filter @workspace/luxi-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxi-ide", "run", "build" ]
publicDir = "artifacts/luxi-ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22320"
BASE_PATH = "/"
